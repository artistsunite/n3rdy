runConfig:
  cpu: 1
  memoryMiB: 512
  concurrency: 80
  minInstances: 0
  maxInstances: 3

env:
  - variable: NEXTAUTH_URL
    value: https://n3rdy.info
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_BOT_API_URL
    value: http://localhost:8000
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXTAUTH_SECRET
    secret: NEXTAUTH_SECRET
    availability:
      - RUNTIME

  - variable: GOOGLE_CLIENT_ID
    secret: GOOGLE_CLIENT_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: GOOGLE_CLIENT_SECRET
    secret: GOOGLE_CLIENT_SECRET
    availability:
      - RUNTIME
